<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yt clone</title>
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    
</head>
<body>


    <div class="header">
            <div class="header-left-section">
                <div class="header-left-section-block1">
                    <div class="header-hamburger_icon-container">
                        <div class="header-hamburger_icon-cover"><img class="header-hamburger_icon" src="icons/hamburger.png"></div>
                    </div>
                </div>
                <div class="header-left-section-block2">
                    <div class="header-yt-logo-container">
                        <div class="header-yt-logo-cover"><img class="header-yt-logo" src="icons/yt-logo.png"></div>
                    </div>
                </div>
            </div>


            <div class="header-middle-section">
                <div class="header-middle-content-container">
                    <div class="header-type_search-container">
                        <div class="header-search_bar-container">
                            <div class="header-search_bar">
                                <input class="header-search_bar-input" type="search" placeholder="Search">
                            </div>
                        </div>
                        <button class="header-search_icon-container">
                            <div class="header-search_icon-cover"><img class="header-search_icon" src="icons/search-icon.png"></div>
                        </button>
                    </div>
                    <div class="header-voice_search-container">
                        <div class="header-voice_search-cover"><img class="header-voice_search" src="icons/mic.png"></div>
                    </div>
                </div>
            </div>
            
            <div class="header-right-section">
                    <div class="header-create_icon-container">
                        <div class="header-create_icon-cover"><img class="header-create_icon" src="icons/create_video.png"></div>
                    </div>

                    <div class="header-notification_icon-container">
                        <div class="header-notification_icon-cover"><img class="header-notification_icon" src="icons/notification.png"></div>
                    </div>
                    <div class="header-profile_pic-container">
                        <div class="header-profile_pic-cover">
                            <img class="header-profile_pic" src="images/johan.jpeg">
                        </div>
                    </div>
                </div>
    </div>
</body>
</html>
